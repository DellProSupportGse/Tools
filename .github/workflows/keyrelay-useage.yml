name: Record KeyRelay Usage

on:
  repository_dispatch:
    types: [keyrelay_used]

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Show incoming payload
        run: |
          echo "Action: ${{ github.event.action }}"
          echo "Version: ${{ github.event.client_payload.version }}"
          echo "Install ID: ${{ github.event.client_payload.install_id }}"
          echo "Country: ${{ github.event.client_payload.country }}"
          echo "Region: ${{ github.event.client_payload.region }}"
          echo "Timestamp: ${{ github.event.client_payload.timestamp }}"
